# ralph-run.yml — Run ralPhD agent loop via GitHub Actions
#
# Trigger: workflow_dispatch (from Howler, API, or manual)
# Purpose: Run ralph-loop.sh against a target project repo with ralPhD
#          as the engine (RALPH_HOME).
#
# Usage (gh CLI):
#   gh workflow run ralph-run.yml \
#     -f thread="my-thread" \
#     -f prompt="Write the introduction section" \
#     -f autonomy="stage-gates" \
#     -f target_repo="" \
#     -f max_iterations="3"

name: Ralph Run

on:
  workflow_dispatch:
    inputs:
      thread:
        description: "Thread name (used for checkpoint, outputs directory)"
        required: true
        type: string
      prompt:
        description: "Task prompt or planning instruction for the agent"
        required: true
        type: string
      autonomy:
        description: "Autonomy level: autopilot, stage-gates, step-by-step"
        required: false
        default: "stage-gates"
        type: choice
        options:
          - autopilot
          - stage-gates
          - step-by-step
      target_repo:
        description: "Target project repo (owner/name). Empty = run in ralPhD itself."
        required: false
        default: ""
        type: string
      target_ref:
        description: "Branch/ref of the target repo to check out"
        required: false
        default: "main"
        type: string
      max_iterations:
        description: "Max loop iterations (safety cap)"
        required: false
        default: "5"
        type: string
      loop_mode:
        description: "Loop mode: build or plan"
        required: false
        default: "build"
        type: choice
        options:
          - build
          - plan
      commit_mode:
        description: "How to push results back: branch (ralph/<thread>), direct (push to target_ref), none (artifact only)"
        required: false
        default: "branch"
        type: choice
        options:
          - branch
          - direct
          - none
      callback_url:
        description: "Optional webhook URL to POST a JSON summary when the run completes (for Howler integration)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  ralph-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}

    steps:
      # ── 1. Check out ralPhD (the engine) ──────────────────────
      - name: Check out ralPhD
        uses: actions/checkout@v4
        with:
          path: ralph-home
          fetch-depth: 1

      # ── 2. Check out target project repo ──────────────────────
      - name: Check out target repo
        if: ${{ inputs.target_repo != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.target_ref }}
          token: ${{ secrets.TARGET_REPO_TOKEN }}
          path: workspace
          fetch-depth: 0

      - name: Use ralPhD as workspace (no target repo)
        if: ${{ inputs.target_repo == '' }}
        run: |
          ln -s ralph-home workspace

      # ── 3. Set up Python + dependencies ───────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install anthropic
          if [ -f ralph-home/requirements.txt ]; then
            pip install -r ralph-home/requirements.txt
          fi

      # ── 4. Install system tools ───────────────────────────────
      - name: Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      # ── 5. Initialize workspace (.ralph init) ────────────────
      #    If the target repo lacks checkpoint.md / implementation-plan.md,
      #    run init-project.sh --ci to copy templates from RALPH_HOME.
      #    For existing projects, just inject thread/prompt/autonomy.
      - name: Initialize workspace with ralph
        env:
          RALPH_HOME: ${{ github.workspace }}/ralph-home
          INPUT_THREAD: ${{ inputs.thread }}
          INPUT_PROMPT: ${{ inputs.prompt }}
          INPUT_AUTONOMY: ${{ inputs.autonomy }}
        run: |
          cd workspace

          # Run init-project.sh in CI mode if workspace lacks ralph files
          if [ ! -f checkpoint.md ] || [ ! -f implementation-plan.md ]; then
            echo "=== First-time init: workspace missing ralph files ==="
            bash "$RALPH_HOME/scripts/init-project.sh" --ci .
          else
            echo "=== Existing workspace: ralph files already present ==="
          fi

          # Inject thread name into checkpoint.md if it's still a template
          if grep -q '<thread-name>' checkpoint.md 2>/dev/null; then
            sed -i "s/<thread-name>/${INPUT_THREAD}/g" checkpoint.md
          fi
          if grep -q '<thread name>' checkpoint.md 2>/dev/null; then
            sed -i "s/<thread name>/${INPUT_THREAD}/g" checkpoint.md
          fi

          # Inject date
          TODAY=$(date +%Y-%m-%d)
          if grep -q '<date>' checkpoint.md 2>/dev/null; then
            sed -i "s/<date>/${TODAY}/g" checkpoint.md
          fi
          if grep -q '<date>' implementation-plan.md 2>/dev/null; then
            sed -i "s/<date>/${TODAY}/g" implementation-plan.md
          fi
          if grep -q '<thread-name>' implementation-plan.md 2>/dev/null; then
            sed -i "s/<thread-name>/${INPUT_THREAD}/g" implementation-plan.md
          fi
          if grep -q '<thread name>' implementation-plan.md 2>/dev/null; then
            sed -i "s/<thread name>/${INPUT_THREAD}/g" implementation-plan.md
          fi

          # Write operator prompt to inbox.md
          printf '%s\n' "$INPUT_PROMPT" > inbox.md

          # Set autonomy level in implementation-plan.md
          if grep -q '^\*\*Autonomy:\*\*' implementation-plan.md 2>/dev/null; then
            sed -i "s/^\*\*Autonomy:\*\*.*/\*\*Autonomy:\*\* ${INPUT_AUTONOMY}/" implementation-plan.md
          else
            # Insert after the Created line (or first line if not found)
            if grep -q '^\*\*Created:\*\*' implementation-plan.md; then
              sed -i '/^\*\*Created:\*\*/a\**Autonomy:** '"${INPUT_AUTONOMY}" implementation-plan.md
            else
              sed -i "1a\\**Autonomy:** ${INPUT_AUTONOMY}" implementation-plan.md
            fi
          fi

          # Configure git for commits made by agents
          git config user.name "ralph[bot]"
          git config user.email "ralph-bot@users.noreply.github.com"

          # Set default model if not configured via repository variable
          if [ -z "${CLAUDE_MODEL:-}" ]; then
            echo "CLAUDE_MODEL=claude-sonnet-4-6" >> "$GITHUB_ENV"
          fi

          echo "=== Workspace initialized ==="
          echo "  Thread: ${INPUT_THREAD}"
          echo "  Autonomy: ${INPUT_AUTONOMY}"
          echo "  Files:"
          ls -la checkpoint.md implementation-plan.md inbox.md 2>/dev/null || true

      # ── 6. Run the agent loop ─────────────────────────────────
      - name: Run ralph-loop.sh
        env:
          RALPH_HOME: ${{ github.workspace }}/ralph-home
          INPUT_LOOP_MODE: ${{ inputs.loop_mode }}
          INPUT_MAX_ITER: ${{ inputs.max_iterations }}
        run: |
          cd workspace
          bash "$RALPH_HOME/ralph-loop.sh" -p "$INPUT_LOOP_MODE" "$INPUT_MAX_ITER"

      # ── 7. Commit results back to project repo ───────────────
      #    Pushes all agent-produced changes (AI outputs, checkpoint,
      #    implementation plan, source changes) back to the target repo.
      #    Mode: branch (ralph/<thread>), direct (target_ref), or none.
      - name: Commit results back
        if: ${{ inputs.target_repo != '' && inputs.commit_mode != 'none' }}
        env:
          INPUT_THREAD: ${{ inputs.thread }}
          INPUT_COMMIT_MODE: ${{ inputs.commit_mode }}
          INPUT_TARGET_REF: ${{ inputs.target_ref }}
        run: |
          cd workspace

          # Check for any uncommitted changes from the agent run
          if git diff --quiet HEAD && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "=== No uncommitted changes to push ==="
          else
            # Stage all changes (agents may have left unstaged work)
            git add -A
            git commit -m "ralph: agent outputs for thread '${INPUT_THREAD}'" \
              --author="ralph[bot] <ralph-bot@users.noreply.github.com>" \
              || echo "  (nothing new to commit)"
          fi

          # Count commits made during this run (by ralph[bot])
          COMMIT_COUNT=$(git log --author="ralph\[bot\]" --oneline "origin/${INPUT_TARGET_REF}..HEAD" 2>/dev/null | wc -l | tr -d '[:space:]')
          if [ "$COMMIT_COUNT" = "0" ]; then
            echo "=== No new commits to push ==="
            exit 0
          fi
          echo "=== ${COMMIT_COUNT} commit(s) to push ==="

          if [ "$INPUT_COMMIT_MODE" = "branch" ]; then
            # Push to a ralph/<thread> branch
            BRANCH_NAME="ralph/${INPUT_THREAD}"
            echo "  Pushing to branch: ${BRANCH_NAME}"
            git push origin "HEAD:refs/heads/${BRANCH_NAME}" --force
            echo "  ✓ Pushed ${COMMIT_COUNT} commit(s) to ${BRANCH_NAME}"
          elif [ "$INPUT_COMMIT_MODE" = "direct" ]; then
            # Push directly to the target ref
            echo "  Pushing directly to: ${INPUT_TARGET_REF}"
            git push origin "HEAD:refs/heads/${INPUT_TARGET_REF}"
            echo "  ✓ Pushed ${COMMIT_COUNT} commit(s) to ${INPUT_TARGET_REF}"
          fi

      # ── 8. Webhook callback ──────────────────────────────────
      #    POST a JSON summary to callback_url so external systems
      #    (e.g. Howler) can pick up results without polling.
      - name: Webhook callback
        if: ${{ always() && inputs.callback_url != '' }}
        env:
          INPUT_CALLBACK_URL: ${{ inputs.callback_url }}
          INPUT_THREAD: ${{ inputs.thread }}
          INPUT_MODE: ${{ inputs.loop_mode }}
          INPUT_AUTONOMY: ${{ inputs.autonomy }}
          INPUT_MAX_ITER: ${{ inputs.max_iterations }}
          INPUT_TARGET: ${{ inputs.target_repo }}
          INPUT_TARGET_REF: ${{ inputs.target_ref }}
          INPUT_COMMIT_MODE: ${{ inputs.commit_mode }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
        run: |
          cd workspace

          # Determine run status from job outcome
          STATUS="completed"
          if [ -f HUMAN_REVIEW_NEEDED.md ]; then
            STATUS="review_needed"
          fi

          # Extract checkpoint summary (first 20 lines, escaped for JSON)
          CHECKPOINT_SUMMARY=""
          if [ -f checkpoint.md ]; then
            CHECKPOINT_SUMMARY=$(head -20 checkpoint.md | python3 -c "
          import sys, json
          print(json.dumps(sys.stdin.read()))" 2>/dev/null | sed 's/^"//;s/"$//')
          fi

          # Extract last task status from checkpoint
          LAST_TASK=$(grep -m1 '## Next Task' checkpoint.md -A2 2>/dev/null | tail -1 | sed 's/^ *//' || echo "")
          LAST_AGENT=$(grep -m1 '^\*\*Last agent:\*\*' checkpoint.md 2>/dev/null | sed 's/.*: *//' || echo "")

          # Count tasks done vs total from Knowledge State table
          TASKS_DONE=$(grep -c '| done |' checkpoint.md 2>/dev/null || echo "0")
          TASKS_TOTAL=$(grep -c '| done \|| pending \|| in.progress |' checkpoint.md 2>/dev/null || echo "0")

          # Check for human review request
          REVIEW_NEEDED="false"
          REVIEW_BODY=""
          if [ -f HUMAN_REVIEW_NEEDED.md ]; then
            REVIEW_NEEDED="true"
            REVIEW_BODY=$(python3 -c "
          import sys, json
          print(json.dumps(open('HUMAN_REVIEW_NEEDED.md').read()))" 2>/dev/null | sed 's/^"//;s/"$//')
          fi

          # Build JSON payload using jq for proper escaping
          PAYLOAD=$(jq -n \
            --arg thread "$INPUT_THREAD" \
            --arg status "$STATUS" \
            --arg mode "$INPUT_MODE" \
            --arg autonomy "$INPUT_AUTONOMY" \
            --arg max_iter "$INPUT_MAX_ITER" \
            --arg target_repo "${INPUT_TARGET:-}" \
            --arg target_ref "$INPUT_TARGET_REF" \
            --arg commit_mode "$INPUT_COMMIT_MODE" \
            --arg last_agent "$LAST_AGENT" \
            --arg next_task "$LAST_TASK" \
            --arg tasks_done "$TASKS_DONE" \
            --arg tasks_total "$TASKS_TOTAL" \
            --argjson review_needed "$REVIEW_NEEDED" \
            --arg review_body "$REVIEW_BODY" \
            --arg checkpoint_summary "$CHECKPOINT_SUMMARY" \
            --arg run_id "${GITHUB_RUN_ID:-local}" \
            --arg run_url "${GITHUB_SERVER_URL:-https://github.com}/${GITHUB_REPOSITORY:-local}/actions/runs/${GITHUB_RUN_ID:-0}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              event: "ralph.run.completed",
              timestamp: $timestamp,
              thread: $thread,
              status: $status,
              config: {
                mode: $mode,
                autonomy: $autonomy,
                max_iterations: ($max_iter | tonumber),
                target_repo: $target_repo,
                target_ref: $target_ref,
                commit_mode: $commit_mode
              },
              result: {
                last_agent: $last_agent,
                next_task: $next_task,
                tasks_done: ($tasks_done | tonumber),
                tasks_total: ($tasks_total | tonumber),
                review_needed: $review_needed,
                review_body: (if $review_needed then $review_body else null end),
                checkpoint_summary: $checkpoint_summary
              },
              run: {
                id: $run_id,
                url: $run_url
              }
            }')

          echo "=== Webhook callback ==="
          echo "  URL: ${INPUT_CALLBACK_URL}"
          echo "  Status: ${STATUS}"
          echo "  Tasks: ${TASKS_DONE}/${TASKS_TOTAL}"

          # Build curl args
          CURL_ARGS=(
            -sf
            -X POST
            -H "Content-Type: application/json"
            -H "User-Agent: ralph-bot/1.0"
          )

          # Add HMAC signature if CALLBACK_SECRET is set
          if [ -n "${CALLBACK_SECRET:-}" ]; then
            SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$CALLBACK_SECRET" | sed 's/.*= //')
            CURL_ARGS+=(-H "X-Ralph-Signature: sha256=${SIGNATURE}")
          fi

          CURL_ARGS+=(-d "$PAYLOAD" "$INPUT_CALLBACK_URL")

          # POST with retry (3 attempts, 5s between)
          for attempt in 1 2 3; do
            if curl "${CURL_ARGS[@]}" -o /dev/null -w "HTTP %{http_code}" 2>/dev/null; then
              echo ""
              echo "  ✓ Callback delivered (attempt ${attempt})"
              break
            else
              echo ""
              echo "  ⚠ Attempt ${attempt} failed"
              if [ "$attempt" -lt 3 ]; then
                sleep 5
              else
                echo "  ✗ Callback delivery failed after 3 attempts (non-fatal)"
              fi
            fi
          done

      # ── 9. Upload outputs as artifact ─────────────────────────
      - name: Upload AI outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ralph-outputs-${{ inputs.thread }}
          path: |
            workspace/ai-generated-outputs/
            workspace/checkpoint.md
            workspace/implementation-plan.md
            workspace/logs/
          retention-days: 30

      # ── 10. Summary ───────────────────────────────────────────
      - name: Generate run summary
        if: always()
        env:
          INPUT_THREAD: ${{ inputs.thread }}
          INPUT_MODE: ${{ inputs.loop_mode }}
          INPUT_AUTONOMY: ${{ inputs.autonomy }}
          INPUT_MAX_ITER: ${{ inputs.max_iterations }}
          INPUT_TARGET: ${{ inputs.target_repo }}
          INPUT_TARGET_REF: ${{ inputs.target_ref }}
          INPUT_COMMIT_MODE: ${{ inputs.commit_mode }}
          INPUT_CALLBACK_URL: ${{ inputs.callback_url }}
        run: |
          cd workspace

          {
            echo "## Ralph Run Summary"
            echo ""
            echo "- **Thread:** ${INPUT_THREAD}"
            echo "- **Mode:** ${INPUT_MODE}"
            echo "- **Autonomy:** ${INPUT_AUTONOMY}"
            echo "- **Max iterations:** ${INPUT_MAX_ITER}"
            echo "- **Commit mode:** ${INPUT_COMMIT_MODE}"
            if [ -n "${INPUT_TARGET}" ]; then
              echo "- **Target repo:** ${INPUT_TARGET}@${INPUT_TARGET_REF}"
            else
              echo "- **Target repo:** (self)"
            fi
            if [ -n "${INPUT_CALLBACK_URL}" ]; then
              echo "- **Callback:** configured"
            fi
            echo ""

            # Include last checkpoint state
            if [ -f checkpoint.md ]; then
              echo "### Checkpoint"
              echo '```'
              head -30 checkpoint.md
              echo '```'
            fi

            # Include usage stats if available
            if [ -f logs/usage.jsonl ]; then
              echo ""
              echo "### Usage"
              echo '```json'
              tail -5 logs/usage.jsonl
              echo '```'
            fi

            # Flag if human review was requested
            if [ -f HUMAN_REVIEW_NEEDED.md ]; then
              echo ""
              echo "### ⚠️ Human Review Requested"
              cat HUMAN_REVIEW_NEEDED.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"
